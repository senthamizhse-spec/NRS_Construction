<!-- ==================== 02 --- BODY & BACKGROUND ==================== -->

    <div class="container-fluid px-4">
      
      <!-- 03a) Navbar Brand - Logo -->
      <a class="navbar-brand" href="index.html">
        <img src="images/NRS_Logo1.png" alt="NRS Construction Logo" width="70" height="70" class="d-inline-block align-top">
      </a>
      
      <!-- 03b) Mobile Toggle Button - Hamburger Menu -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      
      <!-- 03c) Navigation Links -->
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto fs-2 fw-bold text-center margin-right-5">
          <!-- Home Link (Active) -->
          <li class="nav-item">
            <a class="nav-link active text-dark" aria-current="page" href="index.html">Home</a>
          </li>
          <!-- About Link -->
          <li class="nav-item">
            <a class="nav-link text-dark" href="about.html">About</a>
          </li>
          <!-- Services Link -->
          <li class="nav-item">
            <a class="nav-link text-dark" href="services.html">Services</a>

          </li>

   <!-- ==================== 04 --- MAIN CONTENT ==================== -->


<main class="flex-fill">
  <div class="container py-5">
    <div class="row justify-content-center align-items-center">

      <!-- Contact Column -->
      <div class="col-md-5 mb-4">
        <div class="contact-info text-center text-md-center">
          <h2 class="display-4 fw-bold">Contact Us</h2>
          <ul class="list-unstyled fs-5">
            <li><i class="fas fa-phone "></i> +1234567890</li>
            <li><i class="fas fa-envelope"></i> support@getstuffdone.com</li>
          </ul>
        </div>
      </div>

      <!-- Send Message Column -->
      <div class="col-md-7">
        <div id="contact-form" class="p-4 rounded shadow" style="background-color:rgb(243, 124, 12)">
          <h1 class="display-4 fw-bold">Send us a message</h1>

          <form class="mt-4">
            <div class="mb-3">
              <label for="name" class="form-label fw-bold">Name</label>
              <input type="text" class="form-control" id="name" placeholder="John" required />
            </div>

            <div class="mb-3">
              <label for="phone" class="form-label fw-bold">Phone</label>
              <input type="tel" class="form-control" id="phone" placeholder="+1234567890" minlength="7" maxlength="12" required />
            </div>

            <div class="mb-3">
              <label for="email" class="form-label fw-bold">Email</label>
              <input type="email" class="form-control" id="email" placeholder="john123@gmail.com" required />
            </div>

            <div class="mb-3">
              <label for="message" class="form-label fw-bold">Message</label>
              <textarea class="form-control" id="message" rows="7" placeholder="Write your message" maxlength="400" required></textarea>
            </div>

            <div class="text-center">
              <button type="submit" class="btn btn-info btn-lg px-5">Send</button>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</main>
